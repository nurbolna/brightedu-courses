async function loadTopicSections(){
  var topic=ctx.topic,subj=ctx.subject;
  var hwEl=document.getElementById("tp-hw-sec");
  var testEl=document.getElementById("tp-test-sec");
  if(!hwEl||!testEl)return;

  var hwQs=[], hwAttempts=[];
  try{
    var results = await Promise.all([
      db.getHomework(topic.id),
      user ? db.getHwAttempts(user.id, topic.id) : Promise.resolve([])
    ]);
    hwQs=results[0]||[];
    hwAttempts=results[1]||[];
  }catch(e){hwQs=[];hwAttempts=[];}

  ctx.hwQs = hwQs;
  ctx.hwAttempts = hwAttempts;

  var hwDone = hwAttempts.length > 0;
  var hwAttemptsLeft = Math.max(0, 2 - hwAttempts.length);

  // ── HOMEWORK CARD ──
  if(hwQs.length > 0){
    var lastAttempt = hwAttempts[0];
    var hwStatusHtml = "";
    if(lastAttempt){
      var hwPct=Math.round(lastAttempt.score/lastAttempt.total*100);
      var hwCol=hwPct>=85?"#16A34A":hwPct>=50?"#F59E0B":"#EF4444";
      hwStatusHtml='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:var(--bg2);border-radius:10px">'+
      '<span style="font-size:18px">'+(hwPct>=85?"✅":"📊")+'</span>'+
      '<div style="flex:1">'+
      '<div style="font-size:12px;color:var(--text2)">'+(lang==="kz"?"Соңғы нәтиже":"Последний результат")+'</div>'+
      '<div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800;color:'+hwCol+'">'+hwPct+'%</div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--text2)">'+lastAttempt.score+'/'+lastAttempt.total+'</div>'+
      '</div>';
    }
    hwEl.innerHTML=
    '<div class="card" style="margin-bottom:14px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
    '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:16px">📝 '+t("hwQuiz")+'</div>'+
    '<span style="font-size:11px;background:rgba(37,99,235,.1);color:var(--blue);padding:3px 10px;border-radius:20px;font-weight:700">'+hwQs.length+' '+(lang==="kz"?"сұрақ":"вопросов")+'</span>'+
    '</div>'+
    hwStatusHtml+
    (hwAttemptsLeft>0?
    '<button onclick="startHwQuiz()" style="width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.3)">'+
    '📝 '+(hwDone?t("retakeHw"):t("startHw"))+' ('+(lang==="kz"?"қалды":"осталось")+': '+hwAttemptsLeft+')'+'</button>':
    '<div style="text-align:center;padding:10px;font-size:13px;color:var(--text2);background:var(--bg2);border-radius:9px">'+
    (lang==="kz"?"Максимум 2 рет тапсырылды":"Использованы все 2 попытки")+'</div>')+
    '</div>';
  }

  // ── TEST CARD ──
  var testQs = ctx.topicQs||[];
  var pm=ctx.pm||{};
  var key=subj+"_"+topic.id;
  var topicPassed=pm[key]&&pm[key].passed;
  
  if(testQs.length > 0){
    testEl.innerHTML=
    '<div class="card">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
    '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:16px">✅ '+t("ssTest")+'</div>'+
    '<span style="font-size:11px;background:rgba(37,99,235,.1);color:var(--blue);padding:3px 10px;border-radius:20px;font-weight:700">'+testQs.length+' '+(lang==="kz"?"сұрақ":"вопросов")+'</span>'+
    '</div>'+
    (topicPassed?
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);border-radius:10px">'+
    '<span style="font-size:18px">✅</span>'+
    '<span style="font-size:13px;font-weight:600;color:#16A34A">'+(lang==="kz"?"Тақырып өтілді!":"Тема пройдена!")+'</span>'+
    '</div>':'')+
    (hwDone||hwQs.length===0?
    '<div style="display:flex;gap:8px">'+
    '<button onclick="startSSQuizNew(\'timer\')" style="flex:1;padding:11px;border-radius:10px;border:none;background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2);font-family:Inter,sans-serif;font-weight:700;font-size:13px;cursor:pointer">⏱ '+(lang==="kz"?"Таймермен":"Таймер")+'</button>'+
    '<button onclick="startSSQuizNew(\'practice\')" style="flex:1;padding:11px;border-radius:10px;border:none;background:rgba(22,163,74,.08);color:#16A34A;border:1px solid rgba(22,163,74,.2);font-family:Inter,sans-serif;font-weight:700;font-size:13px;cursor:pointer">🌱 Practice</button>'+
    '</div>':
    '<div style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px">'+
    '<span style="font-size:18px">🔒</span>'+
    '<span style="font-size:13px;color:#D97706">'+t("testLocked")+'</span>'+
    '</div>')+
    '</div>';
  }
}

// Start homework quiz
window.startHwQuiz=function(){
  var qs=ctx.hwQs||[];
  if(!qs.length){toast(lang==="kz"?"Үй жұмысы сұрақтары жоқ":"Нет вопросов д/з","#F59E0B");return;}
  qState.mode="hw";qState.subject=ctx.subject;qState.topicId=ctx.topicId;
  qState.qs=qs;qState.ans={};qState.cur=0;qState.submitted=false;qState.time=0;
  clearInterval(qState.timer);
  renderHwQuiz();showPage("topic");
};

function renderHwQuiz(){
  if(!qState.qs.length)return;
  var q=qState.qs[qState.cur];
  var opts=typeof q.options==="string"?JSON.parse(q.options):q.options;
  var answered=Object.keys(qState.ans).length;
  var pct=answered/qState.qs.length*100;
  var el=document.getElementById("pg-topic");

  var html='<div class="quiz-hdr">'+
  '<button onclick="if(confirm(\''+(lang==="kz"?"Тесттен шығасыз ба?":"Выйти из теста?")+'\'))renderTopicPageNew();" style="background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:20px;padding:4px">←</button>'+
  '<div style="background:rgba(37,99,235,.2);color:#60A5FA;padding:5px 14px;border-radius:50px;font-size:12px;font-weight:700;border:1px solid rgba(37,99,235,.3)">📝 '+t("hwQuiz")+'</div>'+
  '<span style="font-size:12px;color:rgba(255,255,255,.5)">'+(ctx.subject==="math"?t("math"):t("ct"))+'</span>'+
  '</div>'+
  '<div class="q-progress"><div class="q-prog-fill" style="width:'+pct+'%"></div></div>'+
  '<div class="q-wrap">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
  '<span style="font-size:13px;color:var(--text2)">'+t("question")+' '+(qState.cur+1)+' / '+qState.qs.length+'</span>'+
  '</div>'+
  '<div class="q-card">'+(q.image_url?'<img src="'+q.image_url+'" style="max-width:100%;max-height:220px;border-radius:8px;margin-bottom:12px;display:block"/>':'')+'<div class="q-text">'+(lang==="kz"?q.text_kz:(q.text_ru||q.text_kz))+'</div></div>'+
  '<div class="opts">';
  opts.forEach(function(opt,i){
    var sel=qState.ans[q.id]===i;
    html+='<div class="opt'+(sel?" sel":"")+'" onclick="pickHwAns(\''+q.id+'\','+i+')">'+
    '<span class="opt-let">'+"ABCDE"[i]+'</span>'+
    '<span class="opt-txt">'+opt+'</span></div>';
  });
  html+='</div>'+
  '<div class="q-nav">'+
  '<button class="qbtn qbtn-prev" onclick="hwNav(-1)" '+(qState.cur===0?"disabled":"")+'">← '+t("prev")+'</button>'+
  '<div class="q-dots">';
  qState.qs.forEach(function(q2,i){
    var bg=i===qState.cur?"#2563EB":qState.ans[q2.id]!==undefined?"#22C55E":"var(--border)";
    html+='<div class="qdot" onclick="hwGoto('+i+')" style="background:'+bg+'"></div>';
  });
  html+='</div>';
  if(qState.cur<qState.qs.length-1){
    html+='<button class="qbtn qbtn-next" onclick="hwNav(1)">'+t("next")+' →</button>';
  }else{
    html+='<button class="qbtn qbtn-done" onclick="askFinishHw()">✓ '+t("finish")+'</button>';
  }
  html+='</div>'+
  '<div class="q-stats"><span>✅ '+answered+' '+t("answered")+'</span><span>⭕ '+(qState.qs.length-answered)+' '+t("notAnswered")+'</span></div>'+
  '</div>'+
  '<div class="wm">'+(user?user.name+" · ":"")+'Bright Education</div>';
  el.innerHTML=html;
}
window.pickHwAns=function(qId,i){qState.ans[qId]=i;renderHwQuiz();};
window.hwNav=function(d){qState.cur=Math.max(0,Math.min(qState.qs.length-1,qState.cur+d));renderHwQuiz();};
window.hwGoto=function(i){qState.cur=i;renderHwQuiz();};
window.askFinishHw=function(){
  var a=Object.keys(qState.ans).length;
  showModal(t("confirmTitle"),a+"/"+qState.qs.length+" "+(lang==="kz"?"жауапталды":"отвечено"),finalizeHwQuiz);
};

async function finalizeHwQuiz(){
  if(qState.submitted)return;qState.submitted=true;
  var qs=qState.qs;
  var score=qs.filter(function(q){return qState.ans[q.id]===q.correct_index;}).length;
  if(user)await db.saveHwAttempt(user.id,qState.topicId,qState.subject,score,qs.length);
  // Update ctx.hwAttempts
  ctx.hwAttempts=[{score:score,total:qs.length,created_at:new Date().toISOString()}].concat(ctx.hwAttempts||[]);
  renderHwResult(score,qs);
}

function renderHwResult(score,qs){
  var pct=Math.round(score/qs.length*100);
  var el=document.getElementById("pg-topic");
  el.innerHTML=
  '<div class="app-hdr"><button class="back-btn" onclick="renderTopicPageNew()">←</button>'+
  '<div><div class="app-title">📊 '+t("hwResult")+'</div></div></div>'+
  '<div style="max-width:720px;margin:0 auto;padding:16px">'+
  '<div class="card" style="text-align:center;margin-bottom:16px">'+
  '<div style="font-size:42px;margin-bottom:8px">'+(pct>=85?"🎉":"📚")+'</div>'+
  '<div style="font-family:Syne,sans-serif;font-size:40px;font-weight:800;color:'+(pct>=85?"#16A34A":pct>=50?"#F59E0B":"#EF4444")+'">'+pct+'%</div>'+
  '<div style="font-size:14px;color:var(--text2);margin-top:4px">'+score+'/'+qs.length+'</div>'+
  '<button onclick="renderTopicPageNew()" style="margin-top:16px;padding:11px 24px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:14px;cursor:pointer">'+
  (lang==="kz"?"Тестке өту →":"К тесту →")+'</button>'+
  '</div>'+
  // All questions with results
  '<div style="display:flex;flex-direction:column;gap:10px">'+
  qs.map(function(q,qi){
    var opts=typeof q.options==="string"?JSON.parse(q.options):q.options;
    var userAns=qState.ans[q.id];
    var isCorrect=userAns===q.correct_index;
    var isSkipped=userAns===undefined;
    return'<div class="card" style="border-left:4px solid '+(isSkipped?"var(--border)":isCorrect?"#16A34A":"#EF4444")+'">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
    '<span style="font-size:18px">'+(isSkipped?"⭕":isCorrect?"✅":"❌")+'</span>'+
    '<span style="font-weight:700;font-size:14px">'+t("question")+' '+(qi+1)+'</span>'+
    '<span style="margin-left:auto;font-size:12px;padding:2px 8px;border-radius:20px;background:'+(isCorrect?"rgba(22,163,74,.1)":"rgba(239,68,68,.1)")+';color:'+(isCorrect?"#16A34A":"#EF4444")+';font-weight:700">'+
    (isSkipped?(lang==="kz"?"Жауапсыз":"Пропущен"):isCorrect?(lang==="kz"?"Дұрыс":"Верно"):(lang==="kz"?"Қате":"Неверно"))+
    '</span></div>'+
    '<div style="font-size:14px;line-height:1.6;margin-bottom:10px;font-weight:500">'+(lang==="kz"?q.text_kz:(q.text_ru||q.text_kz))+'</div>'+
    '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">'+
    opts.map(function(opt,j){
      var isUser=j===userAns;
      var isCorr=j===q.correct_index;
      var bg=isUser&&isCorrect?"rgba(22,163,74,.12)":isUser&&!isCorrect?"rgba(239,68,68,.1)":isCorr&&!isCorrect?"rgba(22,163,74,.06)":"var(--bg2)";
      var border=isUser&&isCorrect?"1.5px solid #16A34A":isUser&&!isCorrect?"1.5px solid #EF4444":isCorr&&!isCorrect?"1.5px solid rgba(22,163,74,.4)":"1px solid var(--border)";
      var ico=isUser&&isCorrect?"✅ ":isUser&&!isCorrect?"❌ ":isCorr&&!isCorrect?"✓ ":"";
      return'<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:'+bg+';border:'+border+'">'+
      '<span style="width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">'+"ABCD"[j]+'</span>'+
      '<span style="font-size:13px">'+ico+opt+'</span></div>';
    }).join("")+
    '</div>'+
    (q.explanation?
    '<div style="background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);border-radius:10px;padding:12px">'+
    '<div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">💡 '+t("explanation")+'</div>'+
    '<div style="font-size:13px;line-height:1.6;color:var(--text)">'+q.explanation+'</div>'+
    '</div>':"")+
    '</div>';
  }).join("")+
  '</div></div>';
}

// New SS test start (with hw lock check)
window.startSSQuizNew=function(mode){
  qState.mode=mode;qState.subject=ctx.subject;qState.topicId=ctx.topicId;
  qState.qs=ctx.topicQs||[];qState.ans={};qState.cur=0;qState.submitted=false;
  var TOTAL=mode==="timer"?qState.qs.length*60:0;
  qState.time=TOTAL;
  clearInterval(qState.timer);
  if(mode==="timer"){
    qState.timer=setInterval(function(){
      qState.time--;
      var el=document.getElementById("q-timer-el");
      if(el){el.textContent="⏱ "+fmtTime(qState.time);el.className=qState.time<60?"q-timer warn":"q-timer";}
      if(qState.time<=0){clearInterval(qState.timer);finalizeSSQuizNew();}
    },1000);
  }
  renderSSQuiz();showPage("topic");
};

// Override finalize to use new result page
window.askFinishSS=function(){
  var a=Object.keys(qState.ans).length;
  showModal(t("confirmTitle"),a+"/"+qState.qs.length+" "+(lang==="kz"?"жауапталды":"отвечено"),finalizeSSQuizNew);
};

async function finalizeSSQuizNew(){
  if(qState.submitted)return;qState.submitted=true;clearInterval(qState.timer);
  var score=qState.qs.filter(function(q){return qState.ans[q.id]===q.correct_index;}).length;
  var pct=Math.round(score/qState.qs.length*100);
  var passed=pct>=85;
  if(user){
    await db.upsertProg(user.id,qState.topicId,qState.subject,passed,score);
    await db.saveResult(user.id,user.name,qState.subject,"selfStudy",score,qState.qs.length,qState.mode,qState.mode==="timer"?qState.qs.length*60-qState.time:0);
    if(passed){if(!ctx.pm)ctx.pm={};ctx.pm[qState.subject+"_"+qState.topicId]={passed:true,best_score:score};}
  }
  var topicIdx=ctx.topics.findIndex(function(tp){return tp.id===qState.topicId;});
  renderSSTestResult(score,qState.qs.length,pct,passed,ctx.topics[topicIdx+1]);
}

function renderSSTestResult(score,total,pct,passed,nextTopic){
  var gc=passed?"#16A34A":"#EF4444";
  var el=document.getElementById("pg-topic");
  el.innerHTML=
  '<div class="app-hdr"><button class="back-btn" onclick="renderTopicList();showPage(\'topic-list\')">←</button>'+
  '<div><div class="app-title">📊 '+t("ssTest")+'</div></div></div>'+
  '<div style="max-width:500px;margin:0 auto;padding:24px 16px">'+
  '<div class="card" style="text-align:center;padding:32px">'+
  '<div style="font-size:52px;margin-bottom:12px">'+(passed?"🎉":"💪")+'</div>'+
  '<div style="font-family:Syne,sans-serif;font-size:52px;font-weight:800;color:'+gc+'">'+pct+'%</div>'+
  '<div style="font-size:14px;color:var(--text2);margin-bottom:16px">'+score+'/'+total+'</div>'+
  '<div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-bottom:6px">'+
  '<div style="height:100%;background:'+gc+';width:'+pct+'%;border-radius:4px;transition:width 1s"></div></div>'+
  '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:20px">'+
  '<span>0%</span><span style="color:#F59E0B;font-weight:700">85%</span><span>100%</span></div>'+
  '<div style="padding:12px 16px;border-radius:10px;background:'+(passed?"rgba(22,163,74,.08)":"rgba(239,68,68,.08)")+';border:1px solid '+(passed?"rgba(22,163,74,.2)":"rgba(239,68,68,.2)")+';margin-bottom:20px">'+
  '<div style="font-size:14px;font-weight:700;color:'+gc+'">'+(passed?(lang==="kz"?"✅ Өттіңіз! Келесі тақырып ашылды.":"✅ Прошли! Следующая тема открыта."):(lang==="kz"?"❌ Өтпедіңіз. 85%+ керек.":"❌ Не прошли. Нужно 85%+."))+'</div>'+
  '</div>'+
  '<div style="display:flex;flex-direction:column;gap:8px">'+
  (passed&&nextTopic?
  '<button onclick="goTopic(\''+nextTopic.id+'\')" style="padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 12px rgba(22,163,74,.3)">'+
  (lang==="kz"?"Келесі тақырып →":"Следующая тема →")+'</button>':'')+
  (!passed?
  '<button onclick="renderTopicPageNew()" style="padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:14px;cursor:pointer">'+
  '📹 '+(lang==="kz"?"Қайта оқу →":"Повторить тему →")+'</button>':'')+
  '<button onclick="startSSQuizNew(\''+qState.mode+'\')" style="padding:12px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:Inter,sans-serif;font-weight:600;font-size:13px;cursor:pointer">🔄 '+t("retake")+'</button>'+
  '<button onclick="renderTopicList();showPage(\'topic-list\')" style="padding:12px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:Inter,sans-serif;font-weight:600;font-size:13px;cursor:pointer">📚 '+t("backTopics")+'</button>'+
  '</div>'+
  '</div></div>';
}

// ── OVERRIDE goTopic to use new renderTopicPageNew ────────────
var _origGoTopic=window.goTopic;
window.goTopic=async function(topicId){
  var el=document.getElementById("pg-topic");
  el.innerHTML='<div class="loading"><span class="spin" style="font-size:26px">⏳</span><p>'+t("loading")+'</p></div>';
  showPage("topic");
  // Topic-ты ctx-тан іздейміз, жоқ болса DB-ден аламыз
  var topic=ctx.topics?ctx.topics.find(function(tp){return tp.id===topicId;}):null;
  if(!topic){
    // Subject анықтаймыз
    if(!ctx.subject){
      // Екі пәннен де іздейміз
      var mathTs=await db.getTopics("math");
      var ctTs=await db.getTopics("ct");
      topic=mathTs.find(function(tp){return tp.id===topicId;});
      if(topic){ctx.subject="math";ctx.topics=mathTs;}
      else{
        topic=ctTs.find(function(tp){return tp.id===topicId;});
        if(topic){ctx.subject="ct";ctx.topics=ctTs;}
      }
    }else{
      var ts=await db.getTopics(ctx.subject);
      ctx.topics=ts;
      topic=ts.find(function(tp){return tp.id===topicId;});
    }
  }
  if(!topic){
    el.innerHTML='<div class="loading"><p style="color:var(--text2)">Тақырып табылмады</p><button onclick="renderCourseSelect()" style="margin-top:12px;padding:10px 20px;border-radius:9px;border:none;background:var(--blue);color:#fff;cursor:pointer">← Артқа</button></div>';
    return;
  }
  // Progress аламыз
  if(user&&(!ctx.pm||Object.keys(ctx.pm).length===0)){
    var progList=await db.getProgress(user.id);
    ctx.pm={};
    progList.forEach(function(p){ctx.pm[p.subject+"_"+p.topic_id]={passed:p.passed,best_score:p.best_score};});
  }
  var qs=await db.getQuestions(topicId);
  ctx.topicId=topicId;ctx.topic=topic;ctx.topicQs=qs;
  renderTopicPageNew();
};
</script>
