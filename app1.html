<!DOCTYPE html>
<html lang="kz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BRIGHT Education — Платформа</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#F8FAFF;--bg2:#EEF2FF;--text:#0F172A;--text2:#64748B;--border:#E2E8F0;--blue:#2563EB;--blue2:#1D4ED8;--bl:#EFF6FF;--green:#16A34A;--red:#EF4444;--card:#fff;--sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(37,99,235,.06)}
.dark{--bg:#0A1628;--bg2:#111D35;--text:#F0F6FF;--text2:#8BA3C7;--border:rgba(255,255,255,.08);--blue:#3B82F6;--blue2:#2563EB;--bl:rgba(59,130,246,.1);--green:#22C55E;--red:#F87171;--card:rgba(255,255,255,.05);--sh:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text!important;user-select:text!important}
/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(248,250,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.dark .hdr{background:rgba(10,22,40,.95)}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;cursor:pointer}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Syne",sans-serif;font-weight:800;font-size:17px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.logo-text{font-family:"Syne",sans-serif;font-weight:800;font-size:17px;color:var(--text)}
.logo-text span{font-weight:400;opacity:.6}
.hdr-right{display:flex;align-items:center;gap:8px}
.lang-sw{display:flex;background:var(--bg2);border-radius:7px;padding:2px;gap:2px}
.lang-btn{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:"Inter",sans-serif;background:transparent;color:var(--text2);transition:all .15s}
.lang-btn.on{background:var(--blue);color:#fff}
.theme-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text)}
/* HAMBURGER */
.ham-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px;transition:all .15s;flex-shrink:0}
.ham-btn:hover{background:var(--bg2)}
.ham-line{width:16px;height:2px;background:var(--text);border-radius:2px;transition:all .25s}
.ham-btn.open .ham-line:nth-child(1){transform:translateY(7px) rotate(45deg)}
.ham-btn.open .ham-line:nth-child(2){opacity:0;transform:scaleX(0)}
.ham-btn.open .ham-line:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
/* SIDEBAR */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.sb-overlay.show{opacity:1;pointer-events:all}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:260px;background:var(--card);border-right:1px solid var(--border);z-index:160;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.dark .sidebar{background:#0D1B2E}
.sidebar.open{transform:translateX(0)}
.sb-user{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.sb-name{font-size:13px;font-weight:700;margin-bottom:1px}
.sb-role{font-size:11px;color:var(--text2)}
.sb-section{padding:8px 8px 4px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;margin:1px 8px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:500;text-decoration:none}
.sb-item:hover{background:var(--bg2);color:var(--text)}
.sb-item.active{background:rgba(37,99,235,.1);color:var(--blue);font-weight:700}
.dark .sb-item.active{background:rgba(59,130,246,.15)}
.sb-item-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg2)}
.sb-item.active .sb-item-ico{background:rgba(37,99,235,.15)}
.sb-badge{margin-left:auto;background:var(--blue);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800}
.sb-badge.red{background:#EF4444}
.sb-divider{height:1px;background:var(--border);margin:8px 16px}
.sb-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
/* LAYOUT with sidebar offset */
.main-content{margin-top:56px;transition:margin-left .28s}
/* PAGES */
.pg{display:none;min-height:calc(100vh - 56px)}
.pg.on{display:block}
/* AUTH */
.auth-bg{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%)}
.auth-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;box-shadow:var(--sh)}
.auth-head{text-align:center;margin-bottom:28px}
.auth-icon{width:52px;height:52px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Syne",sans-serif;font-weight:800;font-size:26px;margin:0 auto 14px;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.auth-title{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text2)}
.field{margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.field-wrap{position:relative}
.f-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.7}
.field input{width:100%;padding:11px 14px 11px 38px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:"Inter",sans-serif;outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue);background:var(--bl)}
.dark .field input{background:rgba(255,255,255,.06)}
.dark .field input:focus{background:rgba(59,130,246,.08)}
.f-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;font-size:14px;color:var(--text2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:9px 12px;margin-bottom:13px;font-size:13px;color:var(--red);display:none;align-items:center;gap:8px}
.btn-main{width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;font-family:"Inter",sans-serif;font-weight:700;font-size:15px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.3);transition:all .2s;margin-bottom:14px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.div-line{flex:1;height:1px;background:var(--border)}
.div-txt{font-size:12px;color:var(--text2)}
.tg-disabled{width:100%;padding:11px;border-radius:11px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-family:"Inter",sans-serif;font-size:13px;cursor:not-allowed;margin-bottom:18px;opacity:.6}
.sw-txt{text-align:center;font-size:13px;color:var(--text2)}
.sw-link{color:var(--blue);cursor:pointer;font-weight:600}
.sw-link:hover{text-decoration:underline}
.back-txt{text-align:center;font-size:12px;color:var(--text2);margin-top:10px;cursor:pointer;opacity:.7}
.back-txt:hover{opacity:1;color:var(--blue)}
.hint{font-size:11px;color:var(--text2);margin-top:3px;padding-left:2px}
/* APP HEADER (inside pages) */
.app-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:56px;z-index:50}
.back-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);flex-shrink:0}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}
.app-title{font-family:"Syne",sans-serif;font-weight:800;font-size:17px}
.app-sub{font-size:12px;color:var(--text2);margin-top:1px}
/* CARDS */
.wrap{max-width:920px;margin:0 auto;padding:24px 20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--sh)}
.card+.card{margin-top:14px}
/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.sc:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 20px rgba(37,99,235,.12)}
.sc-ico{font-size:28px;margin-bottom:8px}
.sc-num{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:var(--blue);line-height:1}
.sc-lbl{font-size:12px;color:var(--text2);margin-top:5px;font-weight:500}
.sc-action{font-size:11px;color:var(--blue);margin-top:6px;font-weight:600}
/* PROGRESS */
.pb-wrap{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:5px}
.pb-fill{height:100%;border-radius:4px;transition:width .5s}
/* TOPIC LIST */
.topic-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.topic-item:hover{border-color:var(--blue);transform:translateX(3px)}
.topic-item.locked{opacity:.55;cursor:not-allowed}
.topic-item.locked:hover{transform:none;border-color:var(--border)}
.topic-item.done{border-color:rgba(22,163,74,.3);background:rgba(22,163,74,.03)}
.t-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-meta{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-right:4px}
.badge-done{background:rgba(22,163,74,.12);color:#16A34A}
.badge-active{background:rgba(37,99,235,.12);color:var(--blue)}
/* QUIZ */
.quiz-hdr{position:sticky;top:56px;z-index:50;background:rgba(10,22,40,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.q-timer{font-family:"Syne",sans-serif;font-weight:800;font-size:16px;background:rgba(37,99,235,.2);padding:6px 16px;border-radius:50px;color:#60A5FA;border:1px solid rgba(37,99,235,.3)}
.q-timer.warn{background:rgba(239,68,68,.2);color:#F87171;border-color:rgba(239,68,68,.4);animation:pulse-warn 1s ease infinite}
@keyframes pulse-warn{0%,100%{opacity:1}50%{opacity:.6}}
.q-progress{height:3px;background:rgba(255,255,255,.08)}
.q-prog-fill{height:100%;background:linear-gradient(90deg,#2563EB,#0EA5E9);transition:width .3s}
.q-wrap{max-width:720px;margin:0 auto;padding:20px 16px}
/* MOCK SCROLL LAYOUT */
.mock-layout{display:flex;gap:20px;max-width:1100px;margin:0 auto;padding:20px 16px;align-items:flex-start}
.mock-main{flex:1;min-width:0}
.mock-sidebar{width:260px;flex-shrink:0;position:sticky;top:112px}
.mock-nav-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--sh)}
.mock-nav-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.mock-nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.mnav-dot{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:"Syne",sans-serif;font-weight:700;font-size:12px;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;position:relative}
.mnav-dot:hover{border-color:var(--blue);color:var(--blue)}
.mnav-dot.answered{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.4);color:var(--blue)}
.mnav-dot.flagged{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.5);color:#D97706}
.mnav-dot.flagged::after{content:"🚩";position:absolute;top:-4px;right:-4px;font-size:8px}
.mnav-dot.answered.flagged{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.5);color:#D97706}
.mock-nav-legend{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;font-size:11px;color:var(--text2)}
.mock-nav-legend span{display:flex;align-items:center;gap:6px}
.mock-nav-legend i{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-ans{background:rgba(37,99,235,.2);border:1px solid rgba(37,99,235,.4)}
.legend-flag{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4)}
.legend-empty{background:var(--bg2);border:1px solid var(--border)}
.mock-finish-btn{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;font-family:"Inter",sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 12px rgba(22,163,74,.3);transition:all .2s}
.mock-finish-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(22,163,74,.4)}
.mock-stats-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:12px;padding:8px 10px;background:var(--bg2);border-radius:8px}
/* QUESTION BLOCK (scroll layout) */
.q-block{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:var(--sh);scroll-margin-top:120px;transition:border-color .2s}
.q-block.flagged{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.02)}
.q-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.q-num-badge{display:flex;align-items:center;gap:8px}
.q-num{font-family:"Syne",sans-serif;font-weight:800;font-size:15px;color:var(--text)}
.q-diff{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.q-diff.easy{background:rgba(22,163,74,.1);color:#16A34A}
.q-diff.medium{background:rgba(245,158,11,.1);color:#D97706}
.q-diff.hard{background:rgba(239,68,68,.1);color:#EF4444}
.q-flag-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2)}
.q-flag-btn:hover{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.08)}
.q-flag-btn.active{border-color:rgba(245,158,11,.6);background:rgba(245,158,11,.12);color:#D97706}
.q-text{font-size:17px;line-height:1.7;font-weight:500;margin-bottom:18px;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s}
.opt:hover{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.3)}
.opt.sel{background:rgba(37,99,235,.12);border-color:#2563EB}
.opt-let{width:30px;height:30px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--text2);transition:all .15s}
.opt.sel .opt-let{background:#2563EB;border-color:#2563EB;color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.4)}
.opt-txt{font-size:14px;color:var(--text);line-height:1.5}
.opt.sel .opt-txt{font-weight:600;color:var(--text)}
/* RESULT PAGE */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:var(--sh)}
.q-text-old{font-size:18px;line-height:1.65;font-weight:500}
.q-nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
.q-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:220px;margin:0 auto}
.qdot{width:9px;height:9px;border-radius:50%;cursor:pointer;transition:all .15s;flex-shrink:0}
.q-stats{display:flex;justify-content:center;gap:18px;margin-top:12px;font-size:12px;color:var(--text2)}
.qbtn{padding:10px 20px;border-radius:50px;border:none;cursor:pointer;font-family:"Inter",sans-serif;font-weight:700;font-size:13px;transition:all .2s}
.qbtn-prev{background:var(--card);border:1px solid var(--border);color:var(--text)}
.qbtn-prev:disabled{opacity:.3;cursor:not-allowed}
.qbtn-next{background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.3)}
.qbtn-done{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;box-shadow:0 3px 12px rgba(22,163,74,.3)}
/* MOCK RESULT */
.mock-result-wrap{max-width:800px;margin:0 auto;padding:24px 16px}
.mock-result-hero{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center;margin-bottom:20px;box-shadow:var(--sh)}
.mock-result-score{font-family:"Syne",sans-serif;font-size:72px;font-weight:800;line-height:1;margin-bottom:6px}
.mock-result-label{font-size:16px;font-weight:600;margin-bottom:20px}
.mock-result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.mrs{background:var(--bg2);border-radius:12px;padding:14px;text-align:center}
.mrs-n{font-family:"Syne",sans-serif;font-size:22px;font-weight:800}
.mrs-l{font-size:11px;color:var(--text2);margin-top:3px}
.mock-result-btns{display:flex;gap:10px;flex-wrap:wrap}
.mock-result-btns .rbtn{flex:1;min-width:120px}
/* REVIEW SECTION */
.review-section{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.review-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.review-title{font-family:"Syne",sans-serif;font-size:16px;font-weight:800}
.review-filter{display:flex;gap:6px}
.rf-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:"Inter",sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.rf-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.review-item{padding:18px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.review-item:last-child{border-bottom:none}
.review-item:hover{background:var(--bg2)}
.review-item-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
.review-q-num{font-weight:700;font-size:13px;color:var(--text2);flex-shrink:0}
.review-status{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}
.review-status.correct{background:rgba(22,163,74,.12);color:#16A34A}
.review-status.wrong{background:rgba(239,68,68,.1);color:#EF4444}
.review-status.skip{background:rgba(100,116,139,.1);color:var(--text2)}

function getCurrentQuote(){
  // Күн санын NUET басталған күннен санаймыз (2026 жылдың 1 қыркүйегі)
  var start=new Date(2026,8,1);
  var now=new Date();
  var daysSince=Math.floor((now-start)/(1000*60*60*24));
  if(daysSince<0)daysSince=0;
  // Әр 3.5 күнде бір цитата ауысады
  var idx=Math.floor(daysSince/3.5)%QUOTES.length;
  return QUOTES[idx];
}

  var d=r.replace(/\D/g,""),s=d.startsWith("8")?"7"+d.slice(1):d.startsWith("7")?d:"7"+d;
  var b=s.slice(1),res="+7";
  if(b.length>0)res+=" ("+b.slice(0,3);
  if(b.length>=3)res+=") "+b.slice(3,6);
  if(b.length>=6)res+=" "+b.slice(6,8);
  if(b.length>=8)res+=" "+b.slice(8,10);
  return res;
}
function phoneInputHandler(e){
  var input=e.target;
  var key=e.inputType||"";
  var raw=input.value;
  // Өшіру кезінде цифрларды санаймыз
  var digits=raw.replace(/\D/g,"");
  if(digits.startsWith("8"))digits="7"+digits.slice(1);
  if(!digits.startsWith("7"))digits="7"+digits;
  digits=digits.slice(0,11);
  var formatted=fmtPhone(digits);
  input.value=formatted;
  // Cursor соңына қою
  var pos=formatted.length;
  input.setSelectionRange(pos,pos);
  return normPhone(formatted);
}
function normPhone(r){
  var d=r.replace(/\D/g,"");
  if(d.startsWith("8")&&d.length===11)return"+7"+d.slice(1);
  if(d.startsWith("7")&&d.length===11)return"+"+d;
  return d;
}
function validPhone(p){return/^\+7\d{10}$/.test(p);}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function getDriveId(u){if(!u)return null;var m=u.match(/\/file\/d\/([^\/\?&]+)/);return m?m[1]:null;}
function getVideoSrc(u){
  if(!u)return null;
  var did=getDriveId(u);
  if(did)return"https://drive.google.com/file/d/"+did+"/preview";
  var vm=u.match(/vimeo\.com\/(\d+)/);
  if(vm)return"https://player.vimeo.com/video/"+vm[1]+"?title=0&byline=0";
  var ym=[/[?&]v=([^&\s#]+)/,/youtu\.be\/([^\?\s#]+)/];
  for(var i=0;i<ym.length;i++){var m=u.match(ym[i]);if(m)return"https://www.youtube-nocookie.com/embed/"+m[1]+"?rel=0&modestbranding=1&iv_load_policy=3&disablekb=1";}
  return null;
}

  var existing=document.getElementById("notif-dropdown");
  if(existing){existing.remove();return;}
  var dd=document.createElement("div");
  dd.className="notif-dropdown";dd.id="notif-dropdown";
  if(!notifData.length){
    dd.innerHTML='<div style="padding:16px;text-align:center;color:var(--text2);font-size:13px">'+(lang==="kz"?"Хабарлама жоқ":"Нет уведомлений")+'</div>';
  } else {
    dd.innerHTML=notifData.map(function(n){
      if(n.type==="challenge"){
        var d=n.data||{};
        var pct=d.total?Math.round(d.score/d.total*100):0;
        return'<div class="notif-item" onclick="openChallengeNotif(\''+n.id+'\',\''+JSON.stringify(d).replace(/'/g,"&#39;").replace(/"/g,"&quot;")+'\')" >'+
        '<div style="display:flex;gap:8px;align-items:flex-start">'+

        '<div><div style="font-size:13px;font-weight:700;margin-bottom:2px">'+d.from_name+' '+(lang==="kz"?"сені жарысқа шақырды!":"вызывает тебя на дуэль!")+'</div>'+
        '<div style="font-size:12px;color:var(--text2)">'+(d.subject==="math"?"📐 Math":"🧠 CT")+' · '+pct+'% — '+(lang==="kz"?"асып түсе аласың ба?":"сможешь превзойти?")+'</div>'+
        '</div></div></div>';
      }
      return'<div class="notif-item"><div style="font-size:13px">'+n.type+'</div></div>';
    }).join("");
  }
  wrap.appendChild(dd);
  // Сыртын бассаңыз жабылады
  setTimeout(function(){
    document.addEventListener("click",function closeDD(e){
      if(!wrap.contains(e.target)){dd.remove();document.removeEventListener("click",closeDD);}

window.acceptAndStart=function(challengeId,testId,subj){
  // Challenge ID-ны сақтаймыз, тест аяқталса автоматты нәтижені жазамыз
  ctx.activeChallenge={id:challengeId};
  startMock(testId,"timer",subj);
};

// ── CHALLENGE SEND (тест аяқталғаннан кейін) ─────────────────
async function renderChallengeSend(score,total,testId,subject){
  var pg=document.getElementById("pg-mock-result");
  if(!pg)return;
  // Challenge жіберу формасы — нәтиже бетінің соңына қосамыз
  var existing=document.getElementById("challenge-send-block");
  if(existing)return;
  var block=document.createElement("div");
  block.id="challenge-send-block";
  block.style.cssText="max-width:800px;margin:0 auto;padding:0 16px 24px";
  block.innerHTML=
  '<div class="challenge-banner" style="cursor:default">'+
  '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#fff;margin-bottom:12px">⚔️ '+(lang==="kz"?"Досыңа challenge жібер!":"Брось вызов другу!")+'</div>'+
  '<div style="font-size:13px;color:rgba(255,255,255,.8);margin-bottom:14px">'+(lang==="kz"?"Нәтижеңді досыңа жіберіп, одан асып түсуін сұра":"Отправь результат другу и посмотри, сможет ли он побить твой счёт")+'</div>'+
  '<div style="display:flex;gap:8px;margin-bottom:10px">'+
  '<input id="challenge-search" type="text" placeholder="'+(lang==="kz"?"Реферал код немесе телефон (+7...)":"Реферальный код или телефон (+7...)")+'" style="flex:1;padding:10px 13px;border-radius:9px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-family:Inter,sans-serif;font-size:13px;outline:none" />'+
  '<button onclick="searchAndChallenge(\''+testId+'\',\''+subject+'\','+score+','+total+')" style="padding:10px 16px;border-radius:9px;border:none;background:#16A34A;color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:13px;cursor:pointer">⚔️ '+(lang==="kz"?"Жіберу":"Отправить")+'</button>'+
  '</div>'+
  '<div id="challenge-send-msg" style="font-size:12px;color:rgba(255,255,255,.8);min-height:16px"></div>'+
  '</div>';
  pg.appendChild(block);
}

window.searchAndChallenge=async function(testId,subject,score,total){
  var query=document.getElementById("challenge-search");
  var msg=document.getElementById("challenge-send-msg");
  if(!query||!msg)return;
  var val=query.value.trim();
  if(!val){msg.textContent="⚠️ "+(lang==="kz"?"Код немесе телефон жазыңыз":"Введите код или телефон");return;}
  msg.textContent=(lang==="kz"?"Іздеуде...":"Поиск...");
  var found=await db.findUserByRefOrPhone(val);
  if(!found){msg.textContent="❌ "+(lang==="kz"?"Оқушы табылмады":"Пользователь не найден");return;}
  if(found.id===user.id){msg.textContent="⚠️ "+(lang==="kz"?"Өзіңе challenge жіберу мүмкін емес":"Нельзя вызвать самого себя");return;}
  msg.textContent=(lang==="kz"?"Жіберілуде...":"Отправка...");
  try{
    await db.sendChallenge(user,found.id,found.name,testId,subject,score,total);
    msg.textContent="✅ Challenge "+found.name+(lang==="kz"?"-ға жіберілді!":" отправлен!");
    query.value="";
  }catch(e){
    msg.textContent="❌ "+(e.message||"Қате");
  }
};

function renderLogin(){
  var el=document.getElementById("pg-login");
  el.innerHTML='<div class="auth-bg">'+

  '<div class="auth-icon">b</div>'+

  '<div class="field-wrap"><span class="f-ico">📱</span>'+
  '<input id="l-ph" type="tel" maxlength="18" placeholder="+7 (777) 123 45 67" style="letter-spacing:.7px"/>'+
  '</div><div class="hint">'+t("phoneHint")+'</div></div>'+
  '<div class="field"><label class="field-label">'+t("password")+'</label>'+
  '<div class="field-wrap"><span class="f-ico">🔒</span>'+
  '<input id="l-pw" type="password" placeholder="••••••••" style="padding-right:40px"/>'+
  '<button class="f-eye" id="l-eye" onclick="toggleEye(\'l-pw\',\'l-eye\')">👁</button>'+
  '</div></div>'+
  '<div class="err" id="l-err"><span>⚠️</span><span id="l-err-msg"></span></div>'+
  '<button class="btn-main" id="l-btn" onclick="submitLogin()">'+t("loginBtn")+'</button>'+
  '<div class="divider"><div class="div-line"></div><span class="div-txt">'+(lang==="kz"?"немесе":"или")+'</span><div class="div-line"></div></div>'+
  '<button class="tg-disabled">✈ Telegram — '+(lang==="kz"?"жақында 🔜":"скоро 🔜")+'</button>'+
  '<div class="sw-txt">'+t("noAcc")+' <span class="sw-link" onclick="renderRegister()">'+t("register")+'</span></div>'+
  '<div class="back-txt" onclick="window.location.href=\'index.html\'">← '+(lang==="kz"?"Басты бетке":"На главную")+'</div>'+
  '</div></div>';
  showPage("login");

  var phv="",pwv="";
  document.getElementById("l-ph").addEventListener("input",function(e){
    phv=phoneInputHandler(e);
  });
  document.getElementById("l-ph").addEventListener("keydown",function(e){
    if(e.key==="Backspace"||e.key==="Delete"){
      // Цифрларды санап, бірін өшіреміз
      var digits=e.target.value.replace(/\D/g,"");
      if(digits.startsWith("7"))digits=digits.slice(0,digits.length-1);
      if(!digits)digits="";
      var fmt=digits.length?fmtPhone((digits.startsWith("7")?"":"")+digits):"+7";
      e.target.value=fmt;
      phv=normPhone(fmt);
      e.preventDefault();
    }
  });
  document.getElementById("l-pw").addEventListener("input",function(e){pwv=e.target.value;});
  document.getElementById("l-pw").addEventListener("keydown",function(e){if(e.key==="Enter")submitLogin();});

  window.submitLogin=async function(){
    var eb=document.getElementById("l-err"),em=document.getElementById("l-err-msg");
    eb.style.display="none";
    if(!phv||!pwv){em.textContent=t("fillAll");eb.style.display="flex";return;}
    if(!validPhone(phv)){em.textContent=t("invalidPhone");eb.style.display="flex";return;}
    var btn=document.getElementById("l-btn");btn.textContent=t("loading");btn.disabled=true;
    try{
      var u=await db.loginUser(phv,pwv);
      setUser(u);
      if(u.role==="admin")renderAdmin();
      else renderDashboard();
    }catch(e){
      em.textContent=t("wrongPass");eb.style.display="flex";
    }finally{btn.textContent=t("loginBtn");btn.disabled=false;}
  };
}

function toggleEye(inputId,btnId){
  var inp=document.getElementById(inputId);
  var btn=document.getElementById(btnId);
  if(!inp||!btn)return;
  var show=inp.type==="password";
  inp.type=show?"text":"password";
  btn.textContent=show?"🙈":"👁";
}

// ── DASHBOARD ─────────────────────────────────────────────────
async function renderDashboard(){
  if(!user){renderLogin();return;}
  var el=document.getElementById("pg-dashboard");
  el.innerHTML='<div class="loading"><span class="spin" style="font-size:26px">⏳</span></div>';
  showPage("dashboard");

  var[prog,mathT,ctT,myRes,leaderboard,streak,refStats,weeklyTime]=await Promise.all([
    db.getProgress(user.id),db.getTopics("math"),db.getTopics("ct"),
    db.getMyResults(user.id),db.getLeaderboard(),
    db.getStreak(user.id),db.getReferralStats(user.id),
    db.getWeeklyTime(user.id)
  ]);

  var pm={};prog.forEach(function(p){pm[p.subject+"_"+p.topic_id]=p;});
  ctx.allTopics={math:mathT,ct:ctT};ctx.allPm=pm;
  var md=mathT.filter(function(tp){return pm["math_"+tp.id]&&pm["math_"+tp.id].passed;}).length;
  var cd=ctT.filter(function(tp){return pm["ct_"+tp.id]&&pm["ct_"+tp.id].passed;}).length;
  var mock=myRes.filter(function(r){return r.type==="mock";});
  var best=mock.length?Math.max.apply(null,mock.map(function(r){return Math.round(r.score/r.total*100);})):0;
  var avg=mock.length?Math.round(mock.reduce(function(s,r){return s+r.score/r.total*100;},0)/mock.length):0;

  // NUET күні — жыл сайын наурыз айының 2-інші сейсенбісі (~11 наурыз)
  var now=new Date();
  var nuetDate=new Date(now.getFullYear(),2,11);
  if(now>nuetDate)nuetDate=new Date(now.getFullYear()+1,2,11);
  var daysLeft=Math.ceil((nuetDate-now)/(1000*60*60*24));

  // Achievements
  var achievements=[];
  if(mock.length>=1)achievements.push({ico:"🎯",label:lang==="kz"?"Алғашқы тест":"Первый тест"});
  if(streak>=3)achievements.push({ico:"🔥",label:"3 "+( lang==="kz"?"күн streak":"дня streak")});
  if(streak>=7)achievements.push({ico:"⚡",label:"7 "+( lang==="kz"?"күн streak":"дней streak")});
  if(best>=80)achievements.push({ico:"⭐",label:"80%+ "+( lang==="kz"?"балл":"балл")});
  if(best>=90)achievements.push({ico:"🏆",label:"90%+ "+( lang==="kz"?"балл":"балл")});
  if(md+cd>=5)achievements.push({ico:"📚",label:"5 "+ (lang==="kz"?"тақырып":"тем")});
  if(mock.length>=5)achievements.push({ico:"💪",label:"5 "+( lang==="kz"?"тест":"тестов")});
  if(refStats.length>=1)achievements.push({ico:"🤝",label:lang==="kz"?"Алғашқы шақыру":"Первый реферал"});
  if(refStats.length>=3)achievements.push({ico:"🎁",label:lang==="kz"?"3 дос шақырды":"3 друга"});

  var refLink=window.location.origin+window.location.pathname+"?ref="+myRefCode;

function buildLeaderboard(rows){

  rows.map(function(r,i){
    var isMe=user&&r.id===user.id;

    var col=r.pct>=75?"#16A34A":r.pct>=50?"#F59E0B":"#EF4444";
    return'<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:'+(isMe?"rgba(37,99,235,.08)":"var(--bg2)")+';border:1px solid '+(isMe?"rgba(37,99,235,.25)":"transparent")+'">'+
    '<span style="width:20px;font-size:13px;text-align:center">'+(medal||("#"+(i+1)))+'</span>'+
    '<span style="flex:1;font-size:13px;font-weight:'+(isMe?"700":"500")+';color:var(--text)">'+r.name+(isMe?" ✓":"")+'</span>'+
    '<span style="font-size:11px;color:var(--text2)">'+(r.subject==="math"?"📐":"🧠")+'</span>'+

    '</div>';
  }).join("")+

}

function buildCCard(subj,ico,label,desc,total,done,topics,pm,bg){
  var pct=total>0?Math.round(done/total*100):0;
  var lockedCount=topics.filter(function(tp){return !(pm[subj+"_"+tp.id]&&pm[subj+"_"+tp.id].passed);}).length;
  return'<div class="ccard" style="background:'+bg+';cursor:pointer;border-radius:18px;padding:22px;box-shadow:0 6px 24px rgba(0,0,0,.18);transition:transform .15s;position:relative;overflow:hidden" onclick="selectCourse(\''+subj+'\')" onmouseover="this.style.transform=\'translateY(-3px)\'" onmouseout="this.style.transform=\'translateY(0)\'">'+

  '<div style="font-size:32px;margin-bottom:10px">'+ico+'</div>'+
  '<div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:4px">'+label+'</div>'+
  '<div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:16px">'+desc+'</div>'+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
  '<div style="flex:1;height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden">'+
  '<div style="height:100%;width:'+pct+'%;background:#fff;border-radius:3px;transition:width .4s"></div>'+
  '</div>'+
  '<span style="font-size:12px;font-weight:700;color:#fff">'+pct+'%</span>'+
  '</div>'+

  '<span>\u2705 '+done+'/'+total+' '+(lang==="kz"?"\u04e9\u0442\u0442\u0456":"\u043f\u0440\u043e\u0439\u0434\u0435\u043d\u043e")+'</span>'+

}

function renderTopicList(){
  var subj=ctx.subject,topics=ctx.topics||[],pm=ctx.pm||{};

    '</div>'+

  });

  el.innerHTML=html;
}

window.saveSSQ=async function(wrapId,listId,type){
  var msg=document.getElementById("sqf-msg");
  var kz=(document.getElementById("sqf-kz")||{}).value||"";
  var ru=(document.getElementById("sqf-ru")||{}).value||"";
  if(!kz.trim()&&!ru.trim()){msg.textContent="⚠️ Сұрақ мәтінін енгізіңіз";msg.style.color="#EF4444";msg.style.display="block";return;}
  var optInputs=document.querySelectorAll("#sqf-opts .opt-editor input[type=text]");
  var opts=[];
  optInputs.forEach(function(inp){opts.push(inp.value.trim());});
  var filled=opts.filter(function(o){return o;});
  if(filled.length<2){msg.textContent="⚠️ Кем дегенде 2 нұсқа керек";msg.style.color="#EF4444";msg.style.display="block";return;}
  var order=parseInt((document.getElementById("sqf-order")||{}).value)||1;
  var expl=(document.getElementById("sqf-expl")||{}).value||"";
  var explImgUrl=(document.getElementById("sqf-expl-img-url")||{}).value||"";
  // Upload expl image if file selected
  var explFileInput=document.getElementById("sqf-expl-image");
  if(explFileInput&&explFileInput.files&&explFileInput.files[0]){
    msg.textContent="🖼 Түсіндірме суреті жүктелуде...";msg.style.color="var(--text2)";msg.style.display="block";
    try{
      explImgUrl=await db.uploadImage(explFileInput.files[0],"ss/expl/"+adminCtx.editTopicId+"/"+Date.now());
    }catch(e){
      msg.textContent="❌ Сурет жүктелмеді: "+e.message;msg.style.color="#EF4444";return;
    }
  }
  var imgUrl=(document.getElementById("sqf-img-url")||{}).value||"";

  // Image upload if file selected
  var fileInput=document.getElementById("sqf-image");
  if(fileInput&&fileInput.files&&fileInput.files[0]){
    msg.textContent="🖼 Сурет жүктелуде...";msg.style.color="var(--text2)";msg.style.display="block";
    try{
      imgUrl=await db.uploadImage(fileInput.files[0],"ss/"+adminCtx.editTopicId+"/"+Date.now());
    }catch(e){
      msg.textContent="❌ Сурет жүктелмеді: "+e.message;msg.style.color="#EF4444";return;
    }
  }

  var qData={
    topic_id:adminCtx.editTopicId,
    text_kz:kz.trim(),
    text_ru:ru.trim(),
    options:JSON.stringify(filled),
    correct_index:adminCtx.correctIdx||0,
    order_num:order,
    difficulty:"medium"
  };
  if(imgUrl)qData.image_url=imgUrl;
  if(type==="hw"){qData.explanation=expl.trim();if(explImgUrl)qData.explanation_image_url=explImgUrl;}
  if(adminCtx.editQId)qData.id=adminCtx.editQId;

  msg.textContent="💾 Сақталуда...";msg.style.color="var(--text2)";msg.style.display="block";
  try{
    if(type==="hw")await db.saveHomeworkQ(qData);
    else await db.saveSSQuestion(qData);
    msg.textContent="✅ Сақталды!";msg.style.color="#16A34A";
    adminCtx.editQId=null;
    setTimeout(function(){
      document.getElementById(wrapId).innerHTML="";
      if(type==="hw")renderAdminSSHw();else renderAdminSSTest();
    },600);
  }catch(e){msg.textContent="❌ "+e.message;msg.style.color="#EF4444";}
};

      '</div>'+
      '<div style="font-size:11px;color:var(--text2)">'+lastAttempt.score+'/'+lastAttempt.total+'</div>'+
      '</div>';
    }
    hwEl.innerHTML=
    '<div class="card" style="margin-bottom:14px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
    '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:16px">📝 '+t("hwQuiz")+'</div>'+

  '<div style="background:rgba(37,99,235,.2);color:#60A5FA;padding:5px 14px;border-radius:50px;font-size:12px;font-weight:700;border:1px solid rgba(37,99,235,.3)">📝 '+t("hwQuiz")+'</div>'+

  });

async function finalizeHwQuiz(){
  if(qState.submitted)return;qState.submitted=true;
  var qs=qState.qs;
  var score=qs.filter(function(q){return qState.ans[q.id]===q.correct_index;}).length;
  if(user)await db.saveHwAttempt(user.id,qState.topicId,qState.subject,score,qs.length);
  // Update ctx.hwAttempts
  ctx.hwAttempts=[{score:score,total:qs.length,created_at:new Date().toISOString()}].concat(ctx.hwAttempts||[]);
  renderHwResult(score,qs);
}

function renderHwResult(score,qs){
  var pct=Math.round(score/qs.length*100);
  var el=document.getElementById("pg-topic");

  function buildHwReview(filter){
    var items=qs.filter(function(q){
      var ua=qState.ans[q.id];
      var ok=ua===q.correct_index;
      var skip=ua===undefined;
      if(filter==="correct")return ok;
      if(filter==="wrong")return !ok&&!skip;
      if(filter==="skip")return skip;
      return true;
    });
    if(!items.length)return'<div style="text-align:center;padding:24px;color:var(--text2);font-size:13px">'+(lang==="kz"?"Нәтиже жоқ":"Нет результатов")+'</div>';
    return items.map(function(q,qi){
      var opts=typeof q.options==="string"?JSON.parse(q.options):q.options;
      var ua=qState.ans[q.id];
      var ok=ua===q.correct_index;
      var skip=ua===undefined;
      return'<div class="card" style="margin-bottom:10px;border-left:4px solid '+(skip?"var(--border)":ok?"#16A34A":"#EF4444")+';padding:14px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
      '<span style="font-size:18px">'+(skip?"⭕":ok?"✅":"❌")+'</span>'+
      '<span style="font-weight:700;font-size:14px">'+t("question")+' '+(qs.indexOf(q)+1)+'</span>'+
      '<span style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:20px;background:'+(ok?"rgba(22,163,74,.1)":"rgba(239,68,68,.1)")+';color:'+(ok?"#16A34A":"#EF4444")+';font-weight:700">'+
      (skip?(lang==="kz"?"Жауапсыз":"Пропущен"):ok?(lang==="kz"?"Дұрыс":"Верно"):(lang==="kz"?"Қате":"Неверно"))+'</span></div>'+
      (q.image_url?'<img src="'+q.image_url+'" style="max-width:100%;max-height:200px;border-radius:8px;margin-bottom:10px;display:block"/>':'')+
      '<div style="font-size:14px;line-height:1.6;margin-bottom:10px;font-weight:500">'+(lang==="kz"?q.text_kz:(q.text_ru||q.text_kz))+'</div>'+
      '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">'+
      opts.map(function(opt,j){
        var isUser=j===ua;
        var isCorr=j===q.correct_index;
        var bg=isUser&&ok?"rgba(22,163,74,.12)":isUser&&!ok?"rgba(239,68,68,.1)":isCorr&&!ok?"rgba(22,163,74,.06)":"var(--bg2)";
        var border=isUser&&ok?"1.5px solid #16A34A":isUser&&!ok?"1.5px solid #EF4444":isCorr&&!ok?"1.5px solid rgba(22,163,74,.4)":"1px solid var(--border)";
        var ico=isUser&&ok?"✅ ":isUser&&!ok?"❌ ":isCorr&&!ok?"✓ ":"";
        return'<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:'+bg+';border:'+border+'">'+
        '<span style="width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">'+("ABCDE"[j])+'</span>'+
        '<span style="font-size:13px">'+ico+opt+'</span></div>';
      }).join("")+'</div>'+
      (q.explanation?
      '<div style="background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);border-radius:10px;padding:12px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">💡 '+t("explanation")+'</div>'+
      '<div style="font-size:13px;line-height:1.6;color:var(--text)">'+q.explanation+'</div>'+
      (q.explanation_image_url?'<img src="'+q.explanation_image_url+'" style="max-width:100%;border-radius:8px;margin-top:10px;display:block"/>':'')+
      '</div>':'')+
      '</div>';
    }).join("");
  }

  var hwReviewFilter="all";
  el.innerHTML=
  '<div class="app-hdr"><button class="back-btn" onclick="renderTopicPageNew()">←</button>'+
  '<div><div class="app-title">📊 '+t("hwResult")+'</div></div></div>'+
  '<div style="max-width:720px;margin:0 auto;padding:16px">'+
  '<div class="card" style="text-align:center;margin-bottom:16px">'+
  '<div style="font-size:42px;margin-bottom:8px">'+(pct>=85?"🎉":"📚")+'</div>'+
  '<div style="font-family:Syne,sans-serif;font-size:40px;font-weight:800;color:'+(pct>=85?"#16A34A":pct>=50?"#F59E0B":"#EF4444")+'">'+pct+'%</div>'+
  '<div style="font-size:14px;color:var(--text2);margin-top:4px">'+score+'/'+qs.length+'</div>'+
  '<button onclick="renderTopicPageNew()" style="margin-top:16px;padding:11px 24px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:14px;cursor:pointer">'+
  (lang==="kz"?"Тестке өту →":"К тесту →")+'</button>'+
  '</div>'+
  // Filter buttons
  '<div style="display:flex;gap:8px;margin-bottom:14px">'+
  '<button id="hwrf-all" onclick="hwSwitchReview(\'all\')" class="rf-btn on">'+(lang==="kz"?"Барлығы":"Все")+' ('+qs.length+')</button>'+
  '<button id="hwrf-wrong" onclick="hwSwitchReview(\'wrong\')" class="rf-btn" style="border-color:rgba(239,68,68,.3);color:#EF4444">❌ '+t("wrongQ")+'</button>'+
  '<button id="hwrf-correct" onclick="hwSwitchReview(\'correct\')" class="rf-btn" style="border-color:rgba(22,163,74,.3);color:#16A34A">✅ '+t("correctQ")+'</button>'+
  '</div>'+
  '<div id="hw-review-list">'+buildHwReview("all")+'</div>'+
  '</div>';

  window.hwSwitchReview=function(filter){
    ["all","wrong","correct"].forEach(function(f){
      var btn=document.getElementById("hwrf-"+f);
      if(btn)btn.className="rf-btn"+(f===filter?" on":"");
    });
    var list=document.getElementById("hw-review-list");
    if(list)list.innerHTML=buildHwReview(filter);
  };
}

async function finalizeSSQuizNew(){
  if(qState.submitted)return;qState.submitted=true;clearInterval(qState.timer);
  var score=qState.qs.filter(function(q){return qState.ans[q.id]===q.correct_index;}).length;
  var pct=Math.round(score/qState.qs.length*100);
  var passed=pct>=85;
  if(user){
    await db.upsertProg(user.id,qState.topicId,qState.subject,passed,score);
    await db.saveResult(user.id,user.name,qState.subject,"selfStudy",score,qState.qs.length,qState.mode,qState.mode==="timer"?qState.qs.length*60-qState.time:0);
    if(passed){if(!ctx.pm)ctx.pm={};ctx.pm[qState.subject+"_"+qState.topicId]={passed:true,best_score:score};}
  }
  var topicIdx=ctx.topics.findIndex(function(tp){return tp.id===qState.topicId;});
  renderSSTestResult(score,qState.qs.length,pct,passed,ctx.topics[topicIdx+1]);

  '</div>'+

var _origGoTopic=window.goTopic;
window.goTopic=async function(topicId){
  var el=document.getElementById("pg-topic");
  el.innerHTML='<div class="loading"><span class="spin" style="font-size:26px">⏳</span><p>'+t("loading")+'</p></div>';
  showPage("topic");
  // Topic-ты ctx-тан іздейміз, жоқ болса DB-ден аламыз
  var topic=ctx.topics?ctx.topics.find(function(tp){return tp.id===topicId;}):null;
  if(!topic){
    // Subject анықтаймыз
    if(!ctx.subject){
      // Екі пәннен де іздейміз
      var mathTs=await db.getTopics("math");
      var ctTs=await db.getTopics("ct");
      topic=mathTs.find(function(tp){return tp.id===topicId;});
      if(topic){ctx.subject="math";ctx.topics=mathTs;}
      else{
        topic=ctTs.find(function(tp){return tp.id===topicId;});
        if(topic){ctx.subject="ct";ctx.topics=ctTs;}
      }
    }else{
      var ts=await db.getTopics(ctx.subject);
      ctx.topics=ts;
      topic=ts.find(function(tp){return tp.id===topicId;});
    }
  }
  if(!topic){
    el.innerHTML='<div class="loading"><p style="color:var(--text2)">Тақырып табылмады</p><button onclick="renderCourseSelect()" style="margin-top:12px;padding:10px 20px;border-radius:9px;border:none;background:var(--blue);color:#fff;cursor:pointer">← Артқа</button></div>';
    return;
  }
  // Progress аламыз
  if(user&&(!ctx.pm||Object.keys(ctx.pm).length===0)){
    var progList=await db.getProgress(user.id);
    ctx.pm={};
    progList.forEach(function(p){ctx.pm[p.subject+"_"+p.topic_id]={passed:p.passed,best_score:p.best_score};});
  }
  var qs=await db.getQuestions(topicId);
  ctx.topicId=topicId;ctx.topic=topic;ctx.topicQs=qs;
  renderTopicPageNew();
};

// ── MOCK START + QUIZ ─────────────────────────────────────────
window.startMock=async function(testId,mode,subj){
  if(!user){renderLogin();return;}
  var el=document.getElementById("pg-mock");
  el.innerHTML='<div class="loading"><span class="spin" style="font-size:26px">⏳</span><p>'+t("loading")+'</p></div>';
  showPage("mock");
  var qs=await db.getMockQsByTest(testId);
  if(!qs||!qs.length){toast(lang==="kz"?"Сұрақтар жоқ":"Нет вопросов","#F59E0B");renderMockSelect();return;}
  qState.mode=mode;qState.subject=subj;qState.testId=testId;
  qState.qs=qs;qState.ans={};qState.cur=0;qState.submitted=false;qState.flags={};
  var TOTAL=mode==="timer"?60*60:0;
  qState.time=TOTAL;
  clearInterval(qState.timer);
  if(mode==="timer"){
    qState.timer=setInterval(function(){
      qState.time--;
      var et=document.getElementById("m-timer-el");
      if(et){et.textContent="⏱ "+fmtTime(qState.time);et.style.color=qState.time<300?"#EF4444":"";}
      if(qState.time<=0){clearInterval(qState.timer);finalizeMock();}
    },1000);
  }
  renderMockQuiz();
};

function renderMockQuiz(){
  if(!qState.qs.length)return;
  var q=qState.qs[qState.cur];
  var opts=typeof q.options==="string"?JSON.parse(q.options):q.options;
  var answered=Object.keys(qState.ans).length;
  var pct=answered/qState.qs.length*100;
  var el=document.getElementById("pg-mock");

  var html=
  '<div class="quiz-hdr">'+
  '<button onclick="if(confirm(\''+(lang==="kz"?"Тестен шығасыз ба?":"Выйти из теста?")+'\')){clearInterval(qState.timer);renderMockSelect();}" style="background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:20px;padding:4px">←</button>'+
  (qState.mode==="timer"?'<div class="q-timer" id="m-timer-el">⏱ '+fmtTime(qState.time)+'</div>':
  '<div style="background:rgba(22,163,74,.2);color:#4ADE80;padding:5px 14px;border-radius:50px;font-size:12px;font-weight:700;border:1px solid rgba(22,163,74,.3)">🌱 Practice</div>')+
  '<span style="font-size:12px;color:rgba(255,255,255,.5)">'+(qState.subject==="math"?t("math"):t("ct"))+'</span>'+
  '</div>'+
  '<div class="q-progress"><div class="q-prog-fill" style="width:'+pct+'%"></div></div>'+
  '<div class="q-wrap">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
  '<span style="font-size:13px;color:var(--text2)">'+t("question")+' '+(qState.cur+1)+' '+t("of")+' '+qState.qs.length+'</span>'+
  '<span style="padding:3px 10px;border-radius:20px;font-size:11px;background:var(--bl);color:var(--blue)">'+t("of")+' '+qState.qs.length+'</span>'+
  '</div>'+
  '<div class="q-card">'+
  (q.image_url?'<img src="'+q.image_url+'" style="max-width:100%;max-height:220px;border-radius:8px;margin-bottom:12px;display:block"/>':'')+
  '<div class="q-text">'+(lang==="kz"?q.text_kz:(q.text_ru||q.text_kz))+'</div></div>'+
  '<div class="opts">';
  opts.forEach(function(opt,i){
    var sel=qState.ans[q.id]===i;
    html+='<div class="opt'+(sel?" sel":"")+(qState.flags&&qState.flags[q.id]?" flag":"")+'" id="mopt-'+i+'" style="cursor:pointer">'+
    '<span class="opt-let">'+("ABCDE"[i])+'</span>'+
    '<span class="opt-txt">'+opt+'</span></div>';
  });
  html+='</div>'+
  '<div class="q-nav">'+
  '<button class="qbtn qbtn-prev" onclick="mNav(-1)" '+(qState.cur===0?"disabled":"")+'>← '+t("prev")+'</button>'+
  '<div class="q-dots">';
  qState.qs.forEach(function(q2,i){
    var bg=i===qState.cur?"#2563EB":qState.ans[q2.id]!==undefined?"#22C55E":"var(--border)";
    html+='<div class="qdot" id="mdot-'+i+'" style="background:'+bg+'"></div>';
  });
  html+='</div>';
  if(qState.cur<qState.qs.length-1){
    html+='<button class="qbtn qbtn-next" onclick="mNav(1)">'+t("next")+' →</button>';
  }else{
    html+='<button class="qbtn qbtn-done" onclick="askFinishMock()">✓ '+t("finish")+'</button>';
  }
  html+='</div>'+
  '<div class="q-stats"><span>✅ '+answered+' '+t("answered")+'</span><span>⭕ '+(qState.qs.length-answered)+' '+t("notAnswered")+'</span></div>'+
  '</div>'+
  '<div class="wm">'+(user?user.name+" · ":'')+'Bright Education</div>';
  el.innerHTML=html;

  // Attach answer click handlers
  qState.qs.forEach(function(q2,qi){
    var opts2=typeof q2.options==="string"?JSON.parse(q2.options):q2.options;
    if(qi!==qState.cur)return;
    opts2.forEach(function(opt,i){
      var el2=document.getElementById("mopt-"+i);
      if(el2)el2.addEventListener("click",function(){
        qState.ans[q2.id]=i;
        renderMockQuiz();
      });
    });
  });
  qState.qs.forEach(function(q2,i){
    var dot=document.getElementById("mdot-"+i);
    if(dot)(function(idx){dot.addEventListener("click",function(){qState.cur=idx;renderMockQuiz();});})(i);
  });
}

window.mNav=function(d){qState.cur=Math.max(0,Math.min(qState.qs.length-1,qState.cur+d));renderMockQuiz();};
window.askFinishMock=function(){
  var a=Object.keys(qState.ans).length;
  showModal(t("confirmTitle"),a+"/"+qState.qs.length+" "+(lang==="kz"?"жауапталды":"отвечено"),finalizeMock);
};
async function finalizeMock(){
  if(qState.submitted)return;qState.submitted=true;clearInterval(qState.timer);
  var score=qState.qs.filter(function(q){return qState.ans[q.id]===q.correct_index;}).length;
  var timeTaken=qState.mode==="timer"?3600-qState.time:0;
  if(user)await db.saveResult(user.id,user.name,qState.subject,"mock",score,qState.qs.length,qState.mode,timeTaken);
  ctx.mockResult={score:score,total:qState.qs.length,ans:qState.ans,qs:qState.qs,subject:qState.subject,testId:qState.testId,mode:qState.mode,time:timeTaken};
  showPage("mock-result");
  renderMockResult();
}


function renderMockResult(){
  var r=ctx.mockResult;
  var pct=Math.round(r.score/r.total*100);
  var gc=pct>=75?"#16A34A":pct>=50?"#F59E0B":"#EF4444";
  var grade=pct>=90?t("excellent"):pct>=75?t("good"):t("needPractice");
  var el=document.getElementById("pg-mock-result");

  var wrongCount=r.total-r.score;
  var skippedCount=r.qs.filter(function(q){return r.ans[q.id]===undefined;}).length;

  // Build review list
  var reviewFilter="all";

  function buildReview(filter){
    var items=r.qs.filter(function(q){
      var userAns=r.ans[q.id];
      var isCorrect=userAns===q.correct_index;
      var isSkipped=userAns===undefined;
      if(filter==="correct")return isCorrect;
      if(filter==="wrong")return !isCorrect&&!isSkipped;
      if(filter==="skip")return isSkipped;
      return true;
    });
    if(!items.length)return'<div class="empty" style="padding:32px"><p style="font-size:13px">'+(lang==="kz"?"Нәтиже жоқ":"Нет результатов")+'</p></div>';
    return items.map(function(q,qi){
      var opts=typeof q.options==="string"?JSON.parse(q.options):q.options;
      var userAns=r.ans[q.id];
      var isCorrect=userAns===q.correct_index;
      var isSkipped=userAns===undefined;
      var statusClass=isSkipped?"skip":isCorrect?"correct":"wrong";
      var statusLabel=isSkipped?(lang==="kz"?"Жауапсыз":"Пропущен"):isCorrect?(lang==="kz"?"Дұрыс":"Верно"):(lang==="kz"?"Қате":"Неверно");
      var qIdx=r.qs.indexOf(q);

      var answersHtml=opts.map(function(opt,j){
        var isUser=j===userAns;
        var isCorrectOpt=j===q.correct_index;
        var cls="review-ans";
        var ico="";
        if(isUser&&isCorrect){cls+=" user-correct";ico="✅";}
        else if(isUser&&!isCorrect){cls+=" user-wrong";ico="❌";}
        else if(isCorrectOpt&&!isCorrect){cls+=" correct-ans";ico="✓";}
        else{cls+=" neutral";}
        return'<div class="'+cls+'">'+
        (ico?'<span class="review-ans-ico">'+ico+'</span>':'')+
        '<span class="opt-let" style="font-size:11px;width:22px;height:22px;flex-shrink:0">'+"ABCDE"[j]+'</span>'+
        '<span style="font-size:13px">'+opt+'</span></div>';
      }).join("");

      var videoSrc=q.video_url?getVideoSrc(q.video_url):null;

      return'<div class="review-item" id="rv-'+qIdx+'">'+
      '<div class="review-item-hdr">'+
      '<span class="review-q-num">'+(lang==="kz"?"Сұрақ":"Вопрос")+' '+(qIdx+1)+'</span>'+

      (q.image_url?'<img src="'+q.image_url+'" style="max-width:100%;max-height:220px;border-radius:8px;margin-bottom:10px;display:block"/>':'')+
      '<div class="review-answers">'+answersHtml+'</div>'+
      (videoSrc?'<button class="review-video-btn" onclick="openVideoModal(\''+videoSrc+'\','+(qIdx+1)+')">▶ '+t("watchVideo")+'</button>':'')+
      '</div>';
    }).join("");
  }

  el.innerHTML=
  '<div class="app-hdr"><button class="back-btn" onclick="renderMockSelect()">←</button>'+
  '<div><div class="app-title">📊 '+t("mockTest")+' — '+t("review")+'</div>'+
  '<div class="app-sub">'+(r.subject==="math"?t("math"):t("ct"))+(r.mode==="timer"?" · ⏱":" · 🌱")+'</div></div></div>'+

  '<div class="mock-result-wrap">'+

  // Hero score
  '<div class="mock-result-hero">'+
  '<div class="mock-result-score" style="color:'+gc+'">'+pct+'%</div>'+
  '<div class="mock-result-label" style="color:'+gc+'">'+r.score+'/'+r.total+' · '+grade+'</div>'+
  '<div class="mock-result-stats">'+
  '<div class="mrs"><div class="mrs-n" style="color:#16A34A">'+r.score+'</div><div class="mrs-l">'+t("correctQ")+'</div></div>'+
  '<div class="mrs"><div class="mrs-n" style="color:#EF4444">'+wrongCount+'</div><div class="mrs-l">'+t("wrongQ")+'</div></div>'+
  '<div class="mrs"><div class="mrs-n" style="color:var(--text2)">'+skippedCount+'</div><div class="mrs-l">'+t("skippedQ")+'</div></div>'+
  '</div>'+
  '<div class="mock-result-btns">'+
  '<button class="rbtn rbtn-bl" onclick="startMock(\''+r.testId+'\',\''+r.mode+'\',\''+r.subject+'\')">🔄 '+t("retake")+'</button>'+
  '<button class="rbtn rbtn-ol" onclick="renderMockSelect()">📝 '+t("mockTest")+'</button>'+
  '<button class="rbtn rbtn-ol" onclick="renderDashboard()">🏠 '+t("backHome")+'</button>'+
  '</div></div>'+

  // ⚔️ Challenge жіберу блогы — нәтиже мен тексеру АРАСЫНДА

  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+

  (lang==="kz"?"Нәтижеңді жіберіп, одан асып түсуін сұра":"Отправь результат и посмотри, сможет ли он побить")+'</div>'+
  '</div></div>'+
  '<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">'+

  window.sendChallengeInline=async function(testId,subject,score,total){
  var inp=document.getElementById("challenge-search-inline");
  var msg=document.getElementById("challenge-inline-msg");
  if(!inp||!msg)return;
  var val=inp.value.trim();
  if(!val){msg.textContent="⚠️ "+(lang==="kz"?"Код немесе телефон жазыңыз":"Введите код или телефон");return;}
  msg.textContent=(lang==="kz"?"Іздеуде...":"Поиск...");
  var found=await db.findUserByRefOrPhone(val);
  if(!found){msg.textContent="❌ "+(lang==="kz"?"Оқушы табылмады":"Пользователь не найден");return;}
  if(found.id===user.id){msg.textContent="⚠️ "+(lang==="kz"?"Өзіңе challenge жіберу мүмкін емес":"Нельзя вызвать самого себя");return;}
  msg.textContent=(lang==="kz"?"Жіберілуде...":"Отправка...");
  try{
    await db.sendChallenge(user,found.id,found.name,testId,subject,score,total);
    msg.textContent="✅ "+found.name+(lang==="kz"?"-ға challenge жіберілді! ⚔️":" получил вызов! ⚔️");
    inp.value="";
  }catch(e){msg.textContent="❌ "+(e.message||"Қате");}
};

window.switchReview=function(filter){
  ["all","wrong","correct"].forEach(function(f){
    var btn=document.getElementById("rf-"+f);
    if(btn)btn.className="rf-btn"+(f===filter?" on":"");
  });
  var list=document.getElementById("review-list");
  if(list)list.innerHTML=buildReview(filter);
};

var LETTERS="ABCDEFGH";
window.addOptRow=function(){
  var container=document.getElementById("qf-opts");
  if(!container)return;
  var rows=container.querySelectorAll(".opt-editor");
  var idx=rows.length;
  if(idx>=8){toast(lang==="kz"?"Максимум 8 нұсқа":"Максимум 8 вариантов","#F59E0B");return;}
  var div=document.createElement("div");
  div.className="opt-editor";div.id="opt-row-"+idx;
  div.innerHTML='<span style="width:20px;font-weight:700;color:var(--text2);font-size:13px">'+LETTERS[idx]+'</span>'+
  '<input type="text" placeholder="Нұсқа '+(idx+1)+'"/>'+
  '<button class="opt-correct-btn" id="opt-correct-'+idx+'" onclick="setCorrectOpt('+idx+')" title="Дұрыс жауап">✓</button>';
  container.appendChild(div);
};
window.removeOptRow=function(){
  var container=document.getElementById("qf-opts");
  if(!container)return;
  var rows=container.querySelectorAll(".opt-editor");
  if(rows.length<=2){toast(lang==="kz"?"Минимум 2 нұсқа керек":"Минимум 2 варианта","#F59E0B");return;}
  var last=rows[rows.length-1];
  var lastIdx=rows.length-1;
  // If removing the correct option, reset to 0
  if(adminCtx.correctIdx===lastIdx)setCorrectOpt(0);
  container.removeChild(last);
};

window.setCorrectOpt=function(idx){
  for(var i=0;i<5;i++){
    var btn=document.getElementById("opt-correct-"+i);
    if(btn)btn.className="opt-correct-btn"+(i===idx?" correct":"");
  }
  adminCtx.correctIdx=idx;
};
adminCtx.correctIdx=0;

window.previewQImage=function(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=document.getElementById("img-preview");
    var ph=document.getElementById("img-upload-placeholder");
    if(img){img.src=ev.target.result;img.style.display="block";}

async function adminLoadQData(qId){
  // Load from Supabase
  try{
    var r=await sb.from("mock_questions").select("*").eq("id",qId).single();
    if(r.error||!r.data)return;
    var q=r.data;
    var opts=typeof q.options==="string"?JSON.parse(q.options):q.options||[];
    if(document.getElementById("qf-text-kz"))document.getElementById("qf-text-kz").value=q.text_kz||"";
    if(document.getElementById("qf-text-ru"))document.getElementById("qf-text-ru").value=q.text_ru||"";
    if(document.getElementById("qf-video"))document.getElementById("qf-video").value=q.video_url||"";
    if(document.getElementById("qf-order"))document.getElementById("qf-order").value=q.order_num||1;
    // Fill options dynamically
    var container=document.getElementById("qf-opts");
    if(container&&opts.length){
      container.innerHTML="";
      opts.forEach(function(opt,i){
        var div=document.createElement("div");
        div.className="opt-editor";div.id="opt-row-"+i;
        div.innerHTML='<span style="width:20px;font-weight:700;color:var(--text2);font-size:13px">'+LETTERS[i]+'</span>'+
        '<input type="text" value="'+opt.replace(/"/g,"&quot;")+'"/>'+
        '<button class="opt-correct-btn" id="opt-correct-'+i+'" onclick="setCorrectOpt('+i+')" title="Дұрыс жауап">✓</button>';
        container.appendChild(div);
      });
    }
    // Set correct
    setCorrectOpt(q.correct_index||0);
    // Image
    if(q.image_url){
      document.getElementById("qf-img-url").value=q.image_url;
      var img=document.getElementById("img-preview");
      var ph=document.getElementById("img-upload-placeholder");
      if(img){img.src=q.image_url;img.style.display="block";}
      if(ph)ph.style.display="none";
    }
  }catch(e){}
}

window.adminSaveQ=async function(){
  var msg=document.getElementById("qf-msg");
  var textKz=(document.getElementById("qf-text-kz")||{}).value||"";
  var textRu=(document.getElementById("qf-text-ru")||{}).value||"";
  var videoUrl=(document.getElementById("qf-video")||{}).value||"";
  var orderNum=parseInt((document.getElementById("qf-order")||{}).value)||1;
  var imgUrl=(document.getElementById("qf-img-url")||{}).value||"";

  if(!textKz&&!textRu&&!imgUrl&&!(fileInput&&fileInput.files&&fileInput.files[0])){
    msg.textContent="⚠️ Сұрақ мәтіні немесе сурет болуы керек";msg.style.color="#EF4444";msg.style.display="block";return;
  }

  // Get options
  var optInputs=document.querySelectorAll("#qf-opts .opt-editor input[type=text]");
  var opts=[];
  optInputs.forEach(function(inp){opts.push(inp.value.trim());});
  var filledOpts=opts.filter(function(o){return o;});
  if(filledOpts.length<2){
    msg.textContent="⚠️ Кем дегенде 2 жауап нұсқасы керек";msg.style.color="#EF4444";msg.style.display="block";return;
  }

  // Upload image if file selected
  var fileInput=document.getElementById("qf-image");
  if(fileInput&&fileInput.files&&fileInput.files[0]){
    msg.textContent="🖼 Сурет жүктелуде...";msg.style.color="var(--text2)";msg.style.display="block";
    try{
      var path="mock/"+adminCtx.editTestId+"/"+Date.now()+"-"+fileInput.files[0].name;
      imgUrl=await db.uploadImage(fileInput.files[0],path);
    }catch(e){
      msg.textContent="❌ Сурет жүктелмеді: "+e.message;msg.style.color="#EF4444";return;
    }
  }

  msg.textContent="💾 Сақталуда...";msg.style.color="var(--text2)";msg.style.display="block";

  var qData={
    test_id:adminCtx.editTestId,
    subject:adminCtx.editSubj,
    text_kz:textKz,
    text_ru:textRu,
    options:JSON.stringify(opts.filter(function(o){return o;})),
    correct_index:adminCtx.correctIdx||0,
    video_url:videoUrl,
    image_url:imgUrl,
    order_num:orderNum
  };
  if(adminCtx.editQId)qData.id=adminCtx.editQId;

  try{
    await db.saveMockQuestion(qData);
    msg.textContent="✅ Сақталды!";msg.style.color="#16A34A";
    setTimeout(function(){
      document.getElementById("admin-q-form-wrap").innerHTML="";
      adminCtx.editQId=null;
      renderAdminQuestions();
    },700);
  }catch(e){
    msg.textContent="❌ Қате: "+e.message;msg.style.color="#EF4444";
  }
};

    }

  // Active item
  var pageMap={
    "dashboard":"sbi-dashboard","course-select":"sbi-ss","topic-list":"sbi-ss",
    "topic":"sbi-ss","mock-select":"sbi-mock","mock":"sbi-mock","mock-result":"sbi-mock",
    "rating":"sbi-rating","admin":"sbi-admin"
  };
  ["sbi-dashboard","sbi-ss","sbi-mock","sbi-rating","sbi-admin"].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.classList.remove("active");
  });
  var activeId=pageMap[curPage];

  db.getMockTests("math").then(function(mt){

      var badge=document.getElementById("sb-mock-count");
      if(badge&&total>0){badge.textContent=total;badge.style.display="inline-flex";}
    });
  }).catch(function(){});
  // Notification badge in sidebar
  if(user){
    db.getMyNotifications(user.id).then(function(notifs){

      if(notifs&&notifs.length&&mockItem){

window.setSCorrectOpt=function(idx){
  adminCtx.correctIdx=idx;
  for(var i=0;i<8;i++){
    var btn=document.getElementById("sopt-correct-"+i);
    if(btn)btn.className="opt-correct-btn"+(i===idx?" correct":"");
  }
};

window.addSSOptRow=function(){
  var container=document.getElementById("sqf-opts");
  if(!container)return;
  var rows=container.querySelectorAll(".opt-editor");
  var idx=rows.length;
  if(idx>=8){toast(lang==="kz"?"Максимум 8 нұсқа":"Максимум 8 вариантов","#F59E0B");return;}
  var LETTERS="ABCDEFGH";
  var div=document.createElement("div");
  div.className="opt-editor";div.id="sopt-row-"+idx;
  div.innerHTML='<span style="width:20px;font-weight:700;color:var(--text2);font-size:13px">'+LETTERS[idx]+'</span>'+
  '<input type="text" placeholder="Нұсқа '+(idx+1)+'"/>'+
  '<button class="opt-correct-btn" id="sopt-correct-'+idx+'" onclick="setSCorrectOpt('+idx+')" title="Дұрыс жауап">✓</button>';
  container.appendChild(div);
};

window.removeSSOptRow=function(){
  var container=document.getElementById("sqf-opts");
  if(!container)return;
  var rows=container.querySelectorAll(".opt-editor");
  if(rows.length<=2){toast(lang==="kz"?"Минимум 2 нұсқа керек":"Минимум 2 варианта","#F59E0B");return;}
  rows[rows.length-1].remove();
  if(adminCtx.correctIdx>=rows.length-1){adminCtx.correctIdx=0;setSCorrectOpt(0);}
};

window.previewSSImage=function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=document.getElementById("ss-img-preview");
    var placeholder=document.getElementById("ss-img-upload-placeholder");
    var urlInput=document.getElementById("sqf-img-url");
    if(img){img.src=ev.target.result;img.style.display="block";}
    if(placeholder)placeholder.style.display="none";
    adminCtx.ssImgUrl="__file__";
  };
  reader.readAsDataURL(file);
};

window.syncSSImgUrl=function(val){
  adminCtx.ssImgUrl=val;
  var img=document.getElementById("ss-img-preview");
  var placeholder=document.getElementById("ss-img-upload-placeholder");
  if(val){
    if(img){img.src=val;img.style.display="block";}
    if(placeholder)placeholder.style.display="none";
  }else{
    if(img){img.src="";img.style.display="none";}
    if(placeholder)placeholder.style.display="block";
  }
};

window.clearSSImage=function(){

  var urlInput=document.getElementById("sqf-img-url");

window.saveSSQ=async function(wrapId,listId,type){
  var msg=document.getElementById("sqf-msg");
  var kz=(document.getElementById("sqf-kz")||{}).value||"";
  var ru=(document.getElementById("sqf-ru")||{}).value||"";
  if(!kz.trim()&&!ru.trim()){msg.textContent="⚠️ Сұрақ мәтінін енгізіңіз";msg.style.color="#EF4444";msg.style.display="block";return;}
  var optInputs=document.querySelectorAll("#sqf-opts .opt-editor input[type=text]");
  var opts=[];
  optInputs.forEach(function(inp){opts.push(inp.value.trim());});
  var filled=opts.filter(function(o){return o;});
  if(filled.length<2){msg.textContent="⚠️ Кем дегенде 2 нұсқа керек";msg.style.color="#EF4444";msg.style.display="block";return;}
  var order=parseInt((document.getElementById("sqf-order")||{}).value)||1;
  var expl=(document.getElementById("sqf-expl")||{}).value||"";
  var explImgUrl=(document.getElementById("sqf-expl-img-url")||{}).value||"";
  // Upload expl image if file selected
  var explFileInput=document.getElementById("sqf-expl-image");
  if(explFileInput&&explFileInput.files&&explFileInput.files[0]){
    msg.textContent="🖼 Түсіндірме суреті жүктелуде...";msg.style.color="var(--text2)";msg.style.display="block";
    try{
      explImgUrl=await db.uploadImage(explFileInput.files[0],"ss/expl/"+adminCtx.editTopicId+"/"+Date.now());
    }catch(e){
      msg.textContent="❌ Сурет жүктелмеді: "+e.message;msg.style.color="#EF4444";return;
    }
  }
  var imgUrl=(document.getElementById("sqf-img-url")||{}).value||"";

  // Image upload if file selected
  var fileInput=document.getElementById("sqf-image");
  if(fileInput&&fileInput.files&&fileInput.files[0]){
    msg.textContent="🖼 Сурет жүктелуде...";msg.style.color="var(--text2)";msg.style.display="block";
    try{
      imgUrl=await db.uploadImage(fileInput.files[0],"ss/"+adminCtx.editTopicId+"/"+Date.now());
    }catch(e){
      msg.textContent="❌ Сурет жүктелмеді: "+e.message;msg.style.color="#EF4444";return;
    }
  }

  var qData={
    topic_id:adminCtx.editTopicId,
    text_kz:kz.trim(),
    text_ru:ru.trim(),
    options:JSON.stringify(filled),
    correct_index:adminCtx.correctIdx||0,
    order_num:order,
    difficulty:"medium"
  };
  if(imgUrl)qData.image_url=imgUrl;
  if(type==="hw"){qData.explanation=expl.trim();if(explImgUrl)qData.explanation_image_url=explImgUrl;}
  if(adminCtx.editQId)qData.id=adminCtx.editQId;

  msg.textContent="💾 Сақталуда...";msg.style.color="var(--text2)";msg.style.display="block";
  try{
    if(type==="hw")await db.saveHomeworkQ(qData);
    else await db.saveSSQuestion(qData);
    msg.textContent="✅ Сақталды!";msg.style.color="#16A34A";
    adminCtx.editQId=null;
    setTimeout(function(){
      document.getElementById(wrapId).innerHTML="";
      if(type==="hw")renderAdminSSHw();else renderAdminSSTest();
    },600);
  }catch(e){msg.textContent="❌ "+e.message;msg.style.color="#EF4444";}
};
